name: Daily Star Tracker

on:
  schedule:
    # Run daily at 06:00 UTC (07:00 Sarajevo/CET, 08:00 CEST)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allow manual trigger for testing
    inputs:
      test_mode:
        description: "Run in test mode (picks last 3 stargazers, forces webhook)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write  # Needed to commit updated stargazers.json

env:
  TRACKED_REPO: HDCharts/charts
  DATA_FILE: data/stargazers.json

jobs:
  track-stars:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch stargazers and notify via Kilo webhook
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KILO_WEBHOOK_URL: ${{ secrets.KILO_WEBHOOK_URL }}
          KILO_WEBHOOK_SECRET_HEADER: ${{ vars.KILO_WEBHOOK_SECRET_HEADER }}
          KILO_WEBHOOK_SECRET: ${{ secrets.KILO_WEBHOOK_SECRET }}
        run: |
          ARGS=""
          if [ "${{ inputs.test_mode }}" = "true" ]; then
            ARGS="--test"
          fi
          python scripts/track_stars.py $ARGS

      - name: Commit updated star data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.DATA_FILE }}
          git diff --cached --quiet || git commit -m "chore: update stargazers data [skip ci]"
          git push
